name: Daily Data Leadership Digest

on:
  # Schedule disabled — digest now runs via launchd on local machine.
  # Re-enable the schedule block below to restore GitHub Actions as runner.
  # schedule:
  #   - cron: "0 14 * * 1-5"

  # Manual trigger kept for one-off testing from the Actions tab
  workflow_dispatch:

jobs:
  send-digest:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run digest
        env:
          ANTHROPIC_API_KEY:       ${{ secrets.ANTHROPIC_API_KEY }}
          DIGEST_RECIPIENT_EMAIL:  ${{ secrets.DIGEST_RECIPIENT_EMAIL }}
          DIGEST_SENDER_EMAIL:     ${{ secrets.DIGEST_SENDER_EMAIL }}
          SMTP_HOST:               ${{ secrets.SMTP_HOST }}
          SMTP_PORT:               ${{ secrets.SMTP_PORT }}
          SMTP_USER:               ${{ secrets.SMTP_USER }}
          SMTP_PASSWORD:           ${{ secrets.SMTP_PASSWORD }}
        run: python digest.py
