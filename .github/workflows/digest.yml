name: Daily Data Leadership Digest

on:
  schedule:
    # 14:00 UTC = 7 AM PDT (Mar–Nov). Shifts to 6 AM PST in winter — update to 15 UTC then.
    - cron: "0 14 * * 1-5"   # Weekdays only — change to "0 14 * * *" for daily including weekends

  # Allows you to run manually from the Actions tab to test
  workflow_dispatch:

jobs:
  send-digest:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run digest
        env:
          ANTHROPIC_API_KEY:       ${{ secrets.ANTHROPIC_API_KEY }}
          DIGEST_RECIPIENT_EMAIL:  ${{ secrets.DIGEST_RECIPIENT_EMAIL }}
          DIGEST_SENDER_EMAIL:     ${{ secrets.DIGEST_SENDER_EMAIL }}
          SMTP_HOST:               ${{ secrets.SMTP_HOST }}
          SMTP_PORT:               ${{ secrets.SMTP_PORT }}
          SMTP_USER:               ${{ secrets.SMTP_USER }}
          SMTP_PASSWORD:           ${{ secrets.SMTP_PASSWORD }}
        run: python digest.py
